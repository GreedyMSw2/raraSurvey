<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>A Little Survey 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="surveyWrap" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="top-blob">
      <div class="blob-inner">
        <span class="emoji-top">🌸</span>
        <span class="survey-label">A little survey</span>
      </div>
    </div>

    <div class="card">
      <div id="q1">
        <div class="question-num">Welcome 🌸</div>
        <div class="question-text">Hello, <em>Shiraa</em> — may I ask you a few questions?</div>
        <div class="yn-wrap">
          <button class="btn-yes" onclick="pressYes()">Yes 😊</button>
          <button class="btn-no" id="btnNo" onclick="pressNo()">No 🙅</button>
        </div>
      </div>

      <div id="q2" style="display:none">
        <div class="question-num">Question 1 of 2</div>
        <div class="question-text">dimana <em>kamu sekarang?</em></div>
        <div class="options" id="opts2">
          <div class="option" onclick="selectOption(this,'opts2',null)">
            <div class="option-radio"></div>
            <span class="option-text">Sekolah 🎒</span>
          </div>
          <div class="option" onclick="selectOption(this,'opts2',null)">
            <div class="option-radio"></div>
            <span class="option-text">Rumah 🏠</span>
          </div>
        </div>
        <div class="btn-wrap">
          <button class="btn-next" onclick="goTo(3)">Next →</button>
        </div>
      </div>

      <div id="q3" style="display:none">
        <div class="question-num">Question 2 of 2</div>
        <div class="question-text">Bagaimana <em>perasaan</em> mu saat ini?</div>
        <div class="options" id="opts3">
          <div class="option" onclick="selectOption(this,'opts3','happy')">
            <div class="option-radio"></div>
            <span class="option-text">Senang 😊</span>
          </div>
          <div class="option" onclick="selectOption(this,'opts3','neutral')">
            <div class="option-radio"></div>
            <span class="option-text">Biasa aja 😐</span>
          </div>
          <div class="option" onclick="selectOption(this,'opts3','sad')">
            <div class="option-radio"></div>
            <span class="option-text">Sedih 😔</span>
          </div>
        </div>
        <div class="btn-wrap">
          <button class="btn-next" onclick="goToSong()">Done 🌸</button>
        </div>
      </div>

      <div class="progress" id="progress">
        <div class="dot active" id="d1"></div>
        <div class="dot" id="d2"></div>
        <div class="dot" id="d3"></div>
      </div>
    </div>
  </div>

  <!-- SONG PAGE -->
  <div id="songPage" style="display:none;width:100%;min-height:100vh;"></div>

  <script src="script.js"></script>
</body>
</html>
